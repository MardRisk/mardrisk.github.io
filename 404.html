<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Lost in Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --surface: #0e1120;
      --accent: #5c7cfa;
      --accent2: #f06595;
      --text: #c5cae9;
      --muted: #4a5180;
      --glow: rgba(92,124,250,0.35);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* ── Star field ── */
    canvas#stars {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      padding: 2rem;
      text-align: center;
    }

    /* ── Giant 404 ── */
    .glitch-wrap {
      position: relative;
      line-height: 1;
      margin-bottom: 1.5rem;
    }

    .num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(9rem, 22vw, 18rem);
      letter-spacing: -0.02em;
      color: transparent;
      -webkit-text-stroke: 2px var(--accent);
      position: relative;
      user-select: none;
      animation: float 6s ease-in-out infinite;
    }

    .num::before,
    .num::after {
      content: '404';
      position: absolute;
      inset: 0;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      -webkit-text-stroke: 2px;
      animation: glitch 4s infinite;
    }
    .num::before {
      -webkit-text-stroke-color: var(--accent2);
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
      animation-delay: 0s;
    }
    .num::after {
      -webkit-text-stroke-color: var(--accent);
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      animation-delay: 0.15s;
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92% { transform: translate(-6px, 2px); opacity: 1; }
      94% { transform: translate(5px, -2px); opacity: 1; }
      96% { transform: translate(-3px, 1px); opacity: 1; }
      98% { transform: translate(0); opacity: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-18px); }
    }

    /* ── Astronaut SVG ── */
    .astronaut {
      width: clamp(80px, 14vw, 140px);
      margin-bottom: 2rem;
      animation: spin-drift 18s linear infinite;
      filter: drop-shadow(0 0 18px var(--glow));
    }

    @keyframes spin-drift {
      0%   { transform: rotate(0deg) translateX(30px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(30px) rotate(-360deg); }
    }

    /* ── Text ── */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 0.1em;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    .sub {
      font-size: 0.78rem;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.8;
      margin-bottom: 2.4rem;
    }

    /* ── Terminal line ── */
    .terminal {
      background: var(--surface);
      border: 1px solid var(--muted);
      border-radius: 6px;
      padding: 0.6rem 1.2rem;
      font-size: 0.72rem;
      color: var(--accent);
      margin-bottom: 2.4rem;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .terminal .prompt { color: var(--accent2); }
    .cursor {
      display: inline-block;
      width: 8px; height: 1em;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 2.2rem;
      border: 2px solid var(--accent);
      border-radius: 3px;
      background: transparent;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.3s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--bg); }
    .btn span { position: relative; z-index: 1; }

    /* ── Grid lines decorative ── */
    .grid-line {
      position: fixed;
      background: rgba(92,124,250,0.06);
      pointer-events: none;
      z-index: 0;
    }
    .grid-line.h { width: 100%; height: 1px; top: 50%; }
    .grid-line.v { height: 100%; width: 1px; left: 50%; }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="grid-line h"></div>
<div class="grid-line v"></div>

<div class="scene">

  <!-- floating astronaut -->
  <svg class="astronaut" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- helmet -->
    <circle cx="50" cy="32" r="26" fill="#1a1f3c" stroke="#5c7cfa" stroke-width="2.5"/>
    <circle cx="50" cy="32" r="18" fill="#0e1120" opacity="0.8"/>
    <ellipse cx="44" cy="26" rx="5" ry="3" fill="#5c7cfa" opacity="0.5"/>
    <!-- body -->
    <rect x="28" y="55" width="44" height="42" rx="10" fill="#1a1f3c" stroke="#5c7cfa" stroke-width="2"/>
    <!-- arms -->
    <rect x="10" y="58" width="18" height="10" rx="5" fill="#1a1f3c" stroke="#5c7cfa" stroke-width="2"/>
    <rect x="72" y="58" width="18" height="10" rx="5" fill="#1a1f3c" stroke="#5c7cfa" stroke-width="2"/>
    <!-- legs -->
    <rect x="33" y="95" width="12" height="18" rx="5" fill="#1a1f3c" stroke="#5c7cfa" stroke-width="2"/>
    <rect x="55" y="95" width="12" height="18" rx="5" fill="#1a1f3c" stroke="#5c7cfa" stroke-width="2"/>
    <!-- badge -->
    <rect x="42" y="66" width="16" height="12" rx="3" fill="#5c7cfa" opacity="0.3" stroke="#5c7cfa" stroke-width="1.5"/>
    <!-- visor shine -->
    <ellipse cx="57" cy="27" rx="3" ry="5" fill="white" opacity="0.12" transform="rotate(-20 57 27)"/>
  </svg>

  <div class="glitch-wrap">
    <div class="num">404</div>
  </div>

  <p class="headline">You're Drifting in Deep Space</p>
  <p class="sub">
    Houston, we have a problem — the page you're looking for has
    floated off into the void. It may have been moved, deleted,
    or never existed in this galaxy.
  </p>

  <div class="terminal">
    <span class="prompt">~/mission $</span>
    <span>page_not_found.exe</span>
    <span class="cursor"></span>
  </div>

  <a class="btn" href="/">
    <span>&#8592; Return to Home Base</span>
  </a>

</div>

<script>
  // ── Star field ──
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars(n = 200) {
    stars = Array.from({ length: n }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.4 + 0.1,
      dir: Math.random() * Math.PI * 2
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(197,202,233,${s.a})`;
      ctx.fill();

      // slow drift
      s.x += Math.cos(s.dir) * s.speed * 0.2;
      s.y += Math.sin(s.dir) * s.speed * 0.2;
      if (s.x < 0) s.x = W;
      if (s.x > W) s.x = 0;
      if (s.y < 0) s.y = H;
      if (s.y > H) s.y = 0;

      // twinkle
      s.a += (Math.random() - 0.5) * 0.02;
      s.a = Math.max(0.1, Math.min(1, s.a));
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  draw();
</script>
</body>
</html>
